<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>zincagem topfuso</title>
    <link rel="apple-touch-icon" href="imagens/logocomfundo.png">

    <link rel="icon" type="image/png" sizes="192x192" href="imagens/logocomfundo.png">
    <link rel="icon" type="image/png" sizes="512x512" href="imagens/logocomfundo.png">

    <link rel="icon" type="image/png" sizes="32x32" href="imagens/logocomfundo.png">
</head>

<body>

    <div id="topo">
        <img id="logo" src="imagens/logossemfundo.png" alt="">
    </div>

    <div id="fundotabela">
        <section id="tabela">
            <div>
                <table id="minhaTabela">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Quantidade</th>
                            <th>Data</th>
                            <th>Prazo</th>
                            <th>Observação</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>

                <button class="btn-adicionar" id="adicionar" onclick="abrirModalCadastro()">Adicionar Item</button>
            </div>
        </section>
    </div>

    <div id="meuModal" class="modal-background">
        <div class="modal-conteudo">
            <h3 id="modalTitulo">Adicionar Novo Item</h3>

            <div class="form-grupo">
                <label for="inputSenha">Senha Master (Obrigatória):</label>
                <input type="password" id="inputSenha" placeholder="Digite a senha">
            </div>
            <div class="form-grupo">
                <label for="inputNome">Nome do Item:</label>
                <input type="text" id="inputNome">
            </div>
            <div class="form-grupo">
                <label for="inputQtd">Quantidade:</label>
                <input type="text" id="inputQtd">
            </div>
            <div class="form-grupo">
                <label for="inputData">Data de Envio:</label>
                <input type="date" id="inputData">
            </div>
            <div class="form-grupo">
                <label for="inputPrazo">Prazo (Opcional):</label>
                <input type="date" id="inputPrazo" placeholder="Deixe vazio para 'indefinido'">
            </div>
            <div class="form-grupo">
                <label for="inputObs">Observação:</label>
                <input type="text" id="inputObs">
            </div>

            <div class="modal-botoes">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" id="btnConfirmarForm">Salvar</button>
            </div>
        </div>
    </div>

    <!-- NOVO: MODAL EXCLUSIVO PARA CONFIRMAR EXCLUSÃO COM SENHA OCULTA -->
    <div id="modalExcluir" class="modal-background">
        <div class="modal-conteudo modal-pequeno">
            <h3 class="titulo-excluir">Confirmar Exclusão</h3>

            <p class="texto-aviso">
                Você está prestes a apagar este item permanentemente. Digite a senha master para confirmar:
            </p>

            <div class="form-grupo">
                <label for="inputSenhaExcluir">Senha Master (Obrigatória):</label>
                <input type="password" id="inputSenhaExcluir" placeholder="Digite a senha">
            </div>

            <div class="modal-botoes">
                <button class="btn-cancelar" onclick="fecharModalExcluir()">Cancelar</button>
                <button class="btn-excluir padding-largo" id="btnConfirmarDeletar">Excluir</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc,
            deleteDoc,
            doc,
            onSnapshot,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQV8hQ8ijySu2x531DLyrajZzm3-TiF3M",
            authDomain: "topfuso-c0e54.firebaseapp.com",
            projectId: "topfuso-c0e54",
            storageBucket: "topfuso-c0e54.firebasestorage.app",
            messagingSenderId: "682032428181",
            appId: "1:682032428181:web:76e33628dbd2282dda579c",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const itensColecao = collection(db, "itensTabela");

        const SENHA_MASTER = "1234";
        let idItemSendoEditado = null; // Controla se estamos adicionando ou editando
        let idItemParaExcluir = null;  // Controla o item selecionado para exclusão

        // --- FUNÇÃO: ESCUTAR O BANCO EM TEMPO REAL ---
        onSnapshot(itensColecao, (snapshot) => {
            const tabelaBody = document.getElementById("minhaTabela").getElementsByTagName('tbody')[0];
            tabelaBody.innerHTML = "";

            if (snapshot.size === 0) {
                const novaLinha = tabelaBody.insertRow();
                const celulaAviso = novaLinha.insertCell(0);
                celulaAviso.colSpan = 6;
                celulaAviso.textContent = "Nenhum item encontrado no banco de dados. Clique em Adicionar!";
                celulaAviso.style.textAlign = "center";
                return;
            }

            snapshot.forEach((documento) => {
                const dados = documento.data();
                const idDoItem = documento.id;

                const novaLinha = tabelaBody.insertRow();

                const celulaNome = novaLinha.insertCell(0);
                const celulaQuantidade = novaLinha.insertCell(1);
                const celulaData = novaLinha.insertCell(2);
                const celulaPrazo = novaLinha.insertCell(3);
                const celulaObservacao = novaLinha.insertCell(4);
                const celulaAcoes = novaLinha.insertCell(5);

                let dataFormatada = "-";
                if (dados.dataEnvio && dados.dataEnvio.includes("-")) {
                    const partes = dados.dataEnvio.split("-");
                    dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;
                } else {
                    dataFormatada = dados.dataEnvio || "-";
                }

                if (!dados.prazo) {
                    dados.prazo = "-";
                }

                // CONTINUAÇÃO DA MONTAGEM DA LINHA
                celulaNome.textContent = dados.nome || "-";
                celulaQuantidade.textContent = dados.quantidade || "-";
                celulaData.textContent = dataFormatada;

                // Formata a exibição do prazo na tela (BR) mantendo o valor bruto no atributo
                if (dados.prazo && dados.prazo.includes("-")) {
                    const partes = dados.prazo.split("-");
                    celulaPrazo.textContent = `${partes[2]}/${partes[1]}/${partes[0]}`;
                } else {
                    celulaPrazo.textContent = dados.prazo || "indefinido";
                }

                celulaPrazo.classList.add("coluna-prazo");
                celulaObservacao.textContent = dados.observacao || "-";

                celulaAcoes.innerHTML = `
                    <button class="btn-editar" data-id="${idDoItem}">Editar</button>
                    <button class="btn-excluir" data-id="${idDoItem}">Excluir</button>
                `;

                // Aplica o atributo de prazo na linha (TR) para a varredura visual
                let linhaTr = celulaNome.parentElement;
                if (linhaTr) {
                    linhaTr.setAttribute("data-prazo", dados.prazo);
                }
            }); // Fim do snapshot.forEach

            // Fora do loop, após montar todas as linhas, gerencia os botões e pinta os prazos
            configurarBotoesAcoes();
            verificarPrazos();
        }); // Fim do onSnapshot

        // --- FUNÇÃO GLOBAL: VERIFICAR PRAZOS E APLICAR CORES ---
        function verificarPrazos() {
            let hoje = new Date();
            hoje.setHours(0, 0, 0, 0);

            let linhas = document.querySelectorAll("table tbody tr");

            linhas.forEach(linha => {
                let prazoAttr = linha.getAttribute("data-prazo");

                if (prazoAttr && prazoAttr !== "-" && prazoAttr !== "indefinido") {
                    let dataPrazo;

                    if (prazoAttr.includes("/")) {
                        const partes = prazoAttr.split("/");
                        dataPrazo = new Date(`${partes[2]}-${partes[1]}-${partes[0]}T00:00:00`);
                    } else {
                        dataPrazo = new Date(prazoAttr + "T00:00:00");
                    }

                    dataPrazo.setHours(0, 0, 0, 0);

                    linha.classList.remove("prazo-hoje", "prazo-vencido");

                    if (dataPrazo.getTime() === hoje.getTime()) {
                        linha.classList.add("prazo-hoje");
                    } else if (dataPrazo < hoje) {
                        linha.classList.add("prazo-vencido");
                    }
                }
            });
        }

        // --- CONTROLE DA JANELA INTERNA (MODAL CADASTRO/EDIÇÃO) ---
        window.abrirModalCadastro = function () {
            idItemSendoEditado = null;
            document.getElementById("modalTitulo").textContent = "Adicionar Novo Item";
            limparCamposModal();
            document.getElementById("meuModal").style.display = "flex";
        }

        window.fecharModal = function () {
            document.getElementById("meuModal").style.display = "none";
        }

        function limparCamposModal() {
            document.getElementById("inputSenha").value = "";
            document.getElementById("inputNome").value = "";
            document.getElementById("inputQtd").value = "";
            document.getElementById("inputData").value = "";
            document.getElementById("inputPrazo").value = "";
            document.getElementById("inputObs").value = "";
        }

        // --- CONTROLE DA JANELA INTERNA (MODAL EXCLUSÃO EXCLUSIVA) ---
        function abrirModalExcluir(id) {
            idItemParaExcluir = id;
            document.getElementById("inputSenhaExcluir").value = "";
            document.getElementById("modalExcluir").style.display = "flex";
        }

        window.fecharModalExcluir = function () {
            document.getElementById("modalExcluir").style.display = "none";
            idItemParaExcluir = null;
        }

        // --- SALVAR MUDANÇAS (ADICIONAR OU EDITAR) ---
        document.getElementById("btnConfirmarForm").onclick = async function () {
            const senha = document.getElementById("inputSenha").value;

            if (senha !== SENHA_MASTER) {
                alert("Senha incorreta! Operação negada.");
                return;
            }

            const nome = document.getElementById("inputNome").value.trim();
            const qtd = document.getElementById("inputQtd").value.trim();
            const dataEnvio = document.getElementById("inputData").value;
            let prazo = document.getElementById("inputPrazo").value.trim();
            const obs = document.getElementById("inputObs").value.trim();

            if (!nome || !qtd || !dataEnvio || !obs) {
                alert("Erro: Itens, Quantidade, Data e Observação são obrigatórios!");
                return;
            }

            if (!prazo) {
                prazo = "indefinido";
            } else if (prazo.includes("/")) {
                const partes = prazo.split("/");
                prazo = `${partes[2]}-${partes[1]}-${partes[0]}`;
            }

            try {
                if (idItemSendoEditado === null) {
                    await addDoc(itensColecao, {
                        nome: nome,
                        quantidade: qtd,
                        dataEnvio: dataEnvio,
                        prazo: prazo,
                        observacao: obs
                    });
                } else {
                    const documentoRef = doc(db, "itensTabela", idItemSendoEditado);
                    await updateDoc(documentoRef, {
                        nome: nome,
                        quantidade: qtd,
                        dataEnvio: dataEnvio,
                        prazo: prazo,
                        observacao: obs
                    });
                }
                fecharModal();
                verificarPrazos();
            } catch (e) {
                console.error("Erro ao salvar documento: ", e);
            }
        };

        // --- EVENTO DO BOTÃO CONFIRMAR EXCLUSÃO (DENTRO DO MODAL) ---
        document.getElementById("btnConfirmarDeletar").onclick = async function () {
            const senhaDigitada = document.getElementById("inputSenhaExcluir").value;

            if (!senhaDigitada) {
                alert("Por favor, digite a senha master para autorizar.");
                return;
            }

            if (senhaDigitada !== SENHA_MASTER) {
                alert("Senha incorreta! Operação negada.");
                return;
            }

            if (idItemParaExcluir) {
                try {
                    await deleteDoc(doc(db, "itensTabela", idItemParaExcluir));
                    fecharModalExcluir();
                } catch (e) {
                    console.error("Erro ao deletar item: ", e);
                    alert("Erro ao tentar excluir o item do banco.");
                }
            }
        };

        // --- PREPARAR EDIÇÃO NO MODAL ---
        function abrirModalEdicao(id, linhaElemento) {
            idItemSendoEditado = id;
            document.getElementById("modalTitulo").textContent = "Editar Item Existente";
            limparCamposModal();

            document.getElementById("inputNome").value = linhaElemento.cells[0].textContent;
            document.getElementById("inputQtd").value = linhaElemento.cells[1].textContent;
            document.getElementById("inputPrazo").value = linhaElemento.cells[3].textContent === "indefinido" ? "" : linhaElemento.cells[3].textContent;
            document.getElementById("inputObs").value = linhaElemento.cells[4].textContent;

            const textoData = linhaElemento.cells[2].textContent;
            if (textoData.includes("/")) {
                const partes = textoData.split("/");
                document.getElementById("inputData").value = `${partes[2]}-${partes[1]}-${partes[0]}`;
            }

            document.getElementById("meuModal").style.display = "flex";
        }

        // --- VINCULAR CLIQUES DOS BOTÕES ---
        function configurarBotoesAcoes() {
            document.querySelectorAll("#minhaTabela .btn-excluir").forEach(botao => {
                botao.onclick = function () {
                    const id = this.getAttribute("data-id");
                    abrirModalExcluir(id);
                };
            });

            document.querySelectorAll("#minhaTabela .btn-editar").forEach(botao => {
                botao.onclick = function () {
                    const id = this.getAttribute("data-id");
                    const linha = this.closest("tr");
                    abrirModalEdicao(id, linha);
                };
            });
        }
    </script>
</body>

</html>
